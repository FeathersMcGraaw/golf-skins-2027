<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Golf Skins Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark: #1a2e1a;
      --green-mid: #2d4f2d;
      --green-light: #3d6b3d;
      --fairway: #4a7c4a;
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --cream: #f5f0e8;
      --white: #ffffff;
      --shadow: rgba(0,0,0,0.4);
    }

    html, body {
      height: 100%;
      background: var(--green-dark);
      font-family: 'DM Sans', sans-serif;
      color: var(--cream);
      overflow-x: hidden;
    }

    body {
      background:
        radial-gradient(ellipse at 20% 0%, rgba(74,124,74,0.4) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 100%, rgba(61,107,61,0.3) 0%, transparent 50%),
        linear-gradient(160deg, #1a2e1a 0%, #152615 60%, #0f1f0f 100%);
      min-height: 100vh;
      padding: 0 0 40px 0;
    }

    /* Subtle grass texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%234a7c4a' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 420px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* Header */
    header {
      text-align: center;
      padding: 36px 0 28px;
    }

    .header-icon {
      font-size: 2.2rem;
      margin-bottom: 6px;
      display: block;
    }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.2rem;
      letter-spacing: 3px;
      color: var(--gold-light);
      text-shadow: 0 2px 12px rgba(201,168,76,0.3);
      line-height: 1;
    }

    header p {
      font-size: 0.78rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(245,240,232,0.45);
      margin-top: 6px;
    }

    /* Divider */
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto 28px;
    }

    /* Player Cards */
    .players-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 24px;
    }

    .player-card {
      background: linear-gradient(145deg, rgba(61,107,61,0.35), rgba(45,79,45,0.2));
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 18px;
      padding: 22px 16px 18px;
      text-align: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .player-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(201,168,76,0.12), transparent 65%);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .player-card:active {
      transform: scale(0.94);
    }

    .player-card.tapped {
      border-color: var(--gold);
      box-shadow: 0 0 0 2px rgba(201,168,76,0.3), 0 8px 30px rgba(0,0,0,0.3);
    }

    .player-card.tapped::before { opacity: 1; }

    .player-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.85rem;
      letter-spacing: 2px;
      color: var(--cream);
      line-height: 1;
      margin-bottom: 14px;
    }

    .skin-count {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.4rem;
      line-height: 1;
      color: var(--gold-light);
      text-shadow: 0 2px 10px rgba(201,168,76,0.4);
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .skin-count.pop {
      transform: scale(1.3);
    }

    .skin-label {
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(245,240,232,0.4);
      margin-top: 4px;
    }

    /* Plus indicator */
    .plus-flash {
      position: absolute;
      top: 10px;
      right: 14px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      color: var(--gold-light);
      opacity: 0;
      transform: translateY(0px);
      pointer-events: none;
    }

    .plus-flash.animate {
      animation: plusFloat 0.6s ease forwards;
    }

    @keyframes plusFloat {
      0%   { opacity: 1; transform: translateY(0px); }
      100% { opacity: 0; transform: translateY(-22px); }
    }

    /* Total Panel */
    .total-panel {
      background: linear-gradient(135deg, rgba(201,168,76,0.12), rgba(201,168,76,0.05));
      border: 1px solid rgba(201,168,76,0.35);
      border-radius: 18px;
      padding: 22px 24px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.2), inset 0 1px 0 rgba(201,168,76,0.1);
    }

    .total-label {
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(201,168,76,0.65);
      margin-bottom: 6px;
    }

    .total-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 4rem;
      color: var(--gold-light);
      line-height: 1;
      text-shadow: 0 2px 20px rgba(201,168,76,0.35);
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .total-number.pop {
      transform: scale(1.15);
    }

    .total-sub {
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(245,240,232,0.35);
      margin-top: 4px;
    }

    /* Reset button */
    .reset-btn {
      display: block;
      margin: 22px auto 0;
      background: transparent;
      border: 1px solid rgba(245,240,232,0.15);
      border-radius: 50px;
      color: rgba(245,240,232,0.35);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 10px 24px;
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .reset-btn:active {
      background: rgba(245,240,232,0.07);
      color: rgba(245,240,232,0.6);
    }
  </style>
</head>
<body>
<div class="wrapper">
  <header>
    <span class="header-icon">⛳</span>
    <h1>Skins Tracker</h1>
    <p>Spain Golf Trip 2027</p>
  </header>
  <div class="divider"></div>

  <div class="players-grid" id="playersGrid"></div>

  <div class="total-panel">
    <div class="total-label">Total Skins Played</div>
    <div class="total-number" id="grandTotal">0</div>
    <div class="total-sub">Across all players</div>
  </div>

  <div id="resetArea">
    <button class="reset-btn" onclick="showConfirm()">Reset All Skins</button>
  </div>
  <div id="confirmArea" style="display:none; text-align:center; margin-top:22px;">
    <p style="font-size:0.75rem; letter-spacing:1.5px; text-transform:uppercase; color:rgba(245,240,232,0.45); margin-bottom:14px;">Are you sure?</p>
    <div style="display:flex; gap:12px; justify-content:center;">
      <button class="reset-btn" onclick="confirmReset()" style="border-color:rgba(201,168,76,0.4); color:rgba(201,168,76,0.7);">Yes, Reset</button>
      <button class="reset-btn" onclick="cancelReset()">Cancel</button>
    </div>
  </div>
</div>

<script>
  const DEFAULT_PLAYERS = ['Sam', 'Rob', 'Luke', 'Will'];

  function loadPlayers() {
    const saved = localStorage.getItem('golf_skins');
    if (saved) {
      try { return JSON.parse(saved); } catch(e) {}
    }
    return DEFAULT_PLAYERS.map(name => ({ name, skins: 0 }));
  }

  function savePlayers() {
    localStorage.setItem('golf_skins', JSON.stringify(players));
  }

  const players = loadPlayers();
  const grid = document.getElementById('playersGrid');
  const grandTotalEl = document.getElementById('grandTotal');

  function renderCards() {
    grid.innerHTML = '';
    players.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'player-card';
      card.id = `card-${i}`;
      card.innerHTML = `
        <span class="plus-flash" id="plus-${i}">+1</span>
        <div class="player-name">${p.name}</div>
        <div class="skin-count" id="count-${i}">${p.skins}</div>
        <div class="skin-label">Skins</div>
      `;
      card.addEventListener('click', () => addSkin(i));
      grid.appendChild(card);
    });
    updateTotal();
  }

  function addSkin(i) {
    players[i].skins++;

    const countEl = document.getElementById(`count-${i}`);
    const plusEl  = document.getElementById(`plus-${i}`);
    const cardEl  = document.getElementById(`card-${i}`);

    countEl.textContent = players[i].skins;

    // Pop animation on count
    countEl.classList.remove('pop');
    void countEl.offsetWidth;
    countEl.classList.add('pop');
    setTimeout(() => countEl.classList.remove('pop'), 300);

    // Tapped highlight
    cardEl.classList.add('tapped');
    setTimeout(() => cardEl.classList.remove('tapped'), 350);

    // +1 float
    plusEl.classList.remove('animate');
    void plusEl.offsetWidth;
    plusEl.classList.add('animate');

    updateTotal();
    savePlayers();
  }

  function updateTotal() {
    const total = players.reduce((sum, p) => sum + p.skins, 0);
    grandTotalEl.textContent = total;

    grandTotalEl.classList.remove('pop');
    void grandTotalEl.offsetWidth;
    grandTotalEl.classList.add('pop');
    setTimeout(() => grandTotalEl.classList.remove('pop'), 300);
  }

  function showConfirm() {
    document.getElementById('resetArea').style.display = 'none';
    document.getElementById('confirmArea').style.display = 'block';
  }

  function cancelReset() {
    document.getElementById('confirmArea').style.display = 'none';
    document.getElementById('resetArea').style.display = 'block';
  }

  function confirmReset() {
    players.forEach(p => p.skins = 0);
    savePlayers();
    document.getElementById('confirmArea').style.display = 'none';
    document.getElementById('resetArea').style.display = 'block';
    renderCards();
  }

  renderCards();
</script>
</body>
</html>
